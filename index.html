<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Image Gallery</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="gallery-page">
    <header class="gallery-header">
      <div>
        <p class="eyebrow">Photo Collection</p>
        <h1>Responsive Image Gallery</h1>
        <p class="subtitle">Browse by category, open a lightbox, and navigate with smooth animations.</p>
      </div>
      <div class="filter-group" role="group" aria-label="Gallery categories">
        <button class="filter-btn active" data-category="all">All</button>
        <button class="filter-btn" data-category="nature">Nature</button>
        <button class="filter-btn" data-category="architecture">Architecture</button>
        <button class="filter-btn" data-category="food">Food</button>
      </div>
    </header>

    <section class="gallery-grid" id="galleryGrid">
      <article class="gallery-card" data-category="nature">
        <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=800&q=80" alt="Forest stream" />
        <div class="card-overlay">
          <h2>Forest Stream</h2>
          <p>Nature</p>
        </div>
      </article>
      <article class="gallery-card" data-category="architecture">
        <img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=800&q=80" alt="Modern building" />
        <div class="card-overlay">
          <h2>Modern Building</h2>
          <p>Architecture</p>
        </div>
      </article>
      <article class="gallery-card" data-category="food">
        <img src="https://images.unsplash.com/photo-1490645935967-10de6ba17061?auto=format&fit=crop&w=800&q=80" alt="Delicious dessert" />
        <div class="card-overlay">
          <h2>Delicious Dessert</h2>
          <p>Food</p>
        </div>
      </article>
      <article class="gallery-card" data-category="nature">
        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=800&q=80" alt="Mountain landscape" />
        <div class="card-overlay">
          <h2>Mountain Landscape</h2>
          <p>Nature</p>
        </div>
      </article>
      <article class="gallery-card" data-category="architecture">
        <img src="https://images.unsplash.com/photo-1512453979798-5ea266f8880c?auto=format&fit=crop&w=800&q=80" alt="City skyline" />
        <div class="card-overlay">
          <h2>City Skyline</h2>
          <p>Architecture</p>
        </div>
      </article>
      <article class="gallery-card" data-category="food">
        <img src="https://images.unsplash.com/photo-1478145046317-39f10e56b5e9?auto=format&fit=crop&w=800&q=80" alt="Breakfast platter" />
        <div class="card-overlay">
          <h2>Breakfast Platter</h2>
          <p>Food</p>
        </div>
      </article>
    </section>
  </main>

  <div class="lightbox hidden" id="lightbox">
    <button class="close-btn" id="closeBtn" aria-label="Close lightbox">×</button>
    <button class="nav-btn prev-btn" id="prevBtn" aria-label="Previous image">‹</button>
    <div class="lightbox-content">
      <img id="lightboxImage" src="" alt="Expanded gallery image" />
      <div class="lightbox-caption" id="lightboxCaption"></div>
    </div>
    <button class="nav-btn next-btn" id="nextBtn" aria-label="Next image">›</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
